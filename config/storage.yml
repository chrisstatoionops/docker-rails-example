test:
  service: "Disk"
  root: "<%= Rails.root.join('tmp/storage') %>"

local:
  service: "Disk"
  root: "<%= Rails.root.join('storage') %>"

# S3: set S3_BUCKET and AWS_REGION. Use AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY for keys,
# or omit those to use the SDK default credential chain (IAM role, instance profile, etc.).
amazon:
  service: S3
<% if ENV["AWS_ACCESS_KEY_ID"].present? %>
  access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>
<% end %>
<% if ENV["AWS_SESSION_TOKEN"].present? %>
  session_token: <%= ENV["AWS_SESSION_TOKEN"] %>
<% end %>
  region: <%= ENV.fetch("AWS_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("S3_BUCKET", "unused") %>
